# ============================================================
# Netlify Configuration for Sree Ganesha Mahal
# Simply drag and drop the folder to Netlify to deploy
# ============================================================

[build]
  publish = "."

# Redirect rules
[[redirects]]
  from = "/admin"
  to = "/admin/dashboard.html"
  status = 301

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
